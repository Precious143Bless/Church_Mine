<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" onclick="loadPage('dashboard')">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="loadPage('dashboard')">
                            <i class="fas fa-tachometer-alt me-1"></i>Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('members')">
                            <i class="fas fa-users me-1"></i>Members
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('sacraments')">
                            <i class="fas fa-cross me-1"></i>Sacraments
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('pledges')">
                            <i class="fas fa-hand-holding-heart me-1"></i>Pledges
                        </a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <button class="btn btn-outline-light" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i>Logout
                    </button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <h1 class="display-6 mb-4">
                    <i class="fas fa-tachometer-alt me-2"></i>Dashboard
                </h1>
            </div>
        </div>
        
        <div class="row mb-4">
            <div class="col-md-3 mb-3">
                <div class="card bg-primary text-white">
                    <div class="card-body">
                        <h5 class="card-title">Total Members</h5>
                        <h2 class="display-4" id="totalMembers">0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-success text-white">
                    <div class="card-body">
                        <h5 class="card-title">Total Pledged</h5>
                        <h2 class="display-4" id="totalPledged">₱0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-info text-white">
                    <div class="card-body">
                        <h5 class="card-title">Total Paid</h5>
                        <h2 class="display-4" id="totalPaid">₱0</h2>
                    </div>
                </div>
            </div>
            <div class="col-md-3 mb-3">
                <div class="card bg-warning text-white">
                    <div class="card-body">
                        <h5 class="card-title">Outstanding</h5>
                        <h2 class="display-4" id="outstanding">₱0</h2>
                    </div>
                </div>
            </div>
        </div>
        
        <div class="row">
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header bg-info text-white">
                        <h5 class="mb-0">Baptism</h5>
                    </div>
                    <div class="card-body text-center">
                        <h3 id="baptismCount">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header bg-success text-white">
                        <h5 class="mb-0">Confirmation</h5>
                    </div>
                    <div class="card-body text-center">
                        <h3 id="confirmationCount">0</h3>
                    </div>
                </div>
            </div>
            <div class="col-md-4 mb-3">
                <div class="card">
                    <div class="card-header bg-primary text-white">
                        <h5 class="mb-0">Marriage</h5>
                    </div>
                    <div class="card-body text-center">
                        <h3 id="marriageCount">0</h3>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.initDashboard = async function() {
            await loadDashboardData();
        };
        
        async function loadDashboardData() {
            try {
                const data = await apiCall('/dashboard/');
                
                document.getElementById('totalMembers').textContent = data.total_members;
                document.getElementById('totalPledged').innerHTML = formatCurrency(data.pledges.total_pledged);
                document.getElementById('totalPaid').innerHTML = formatCurrency(data.pledges.total_paid);
                document.getElementById('outstanding').innerHTML = formatCurrency(data.pledges.outstanding);
                document.getElementById('baptismCount').textContent = data.sacraments.baptism;
                document.getElementById('confirmationCount').textContent = data.sacraments.confirmation;
                document.getElementById('marriageCount').textContent = data.sacraments.marriage;
                
            } catch (error) {
                console.error('Error loading dashboard:', error);
            }
        }
        
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                if (typeof window.initDashboard === 'function') window.initDashboard();
            });
        } else {
            if (typeof window.initDashboard === 'function') window.initDashboard();
        }
    </script>
</body>
</html>
