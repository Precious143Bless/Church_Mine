<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/style/style.css">
</head>
<body>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center py-4">
                        <i class="fas fa-church fa-3x mb-2"></i>
                        <h3 class="mb-0">Church Registry System</h3>
                        <p class="mb-0 mt-2">Parish Management System</p>
                    </div>
                    <div class="card-body p-4">
                        <form id="loginForm">
                            <div class="mb-3">
                                <label for="username" class="form-label">
                                    <i class="fas fa-user me-2"></i>Username
                                </label>
                                <input type="text" class="form-control form-control-lg" id="username" required autofocus>
                            </div>
                            <div class="mb-3">
                                <label for="password" class="form-label">
                                    <i class="fas fa-lock me-2"></i>Password
                                </label>
                                <input type="password" class="form-control form-control-lg" id="password" required>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-sign-in-alt me-2"></i>Login
                            </button>
                        </form>
                        <div id="errorMessage" class="alert alert-danger mt-3 d-none"></div>
                    </div>
                    <div class="card-footer text-center text-muted">
                        <small>Authorized Personnel Only</small>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        window.initLogin = function() {
            const form = document.getElementById('loginForm');
            const errorDiv = document.getElementById('errorMessage');
            
            // Clear any existing session
            localStorage.removeItem('auth_token');
            localStorage.removeItem('user');
            
            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value;
                const password = document.getElementById('password').value;
                
                errorDiv.classList.add('d-none');
                
                try {
                    const result = await apiCall('/login/', 'POST', { username, password });
                    
                    if (result.token) {
                        localStorage.setItem('auth_token', result.token);
                        localStorage.setItem('user', JSON.stringify(result.user));
                        loadPage('dashboard');
                    } else {
                        throw new Error('Login failed');
                    }
                } catch (error) {
                    errorDiv.textContent = error.message || 'Invalid username or password';
                    errorDiv.classList.remove('d-none');
                }
            });
        };
        
        // Initialize when page loads
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => {
                if (typeof window.initLogin === 'function') window.initLogin();
            });
        } else {
            if (typeof window.initLogin === 'function') window.initLogin();
        }
    </script>
</body>
</html>
