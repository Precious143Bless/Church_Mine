<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sacraments - Church Registry System</title>
</head>
<body>
    <!-- Navigation (same as dashboard) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary sticky-top">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" onclick="loadPage('dashboard')">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('dashboard')">Dashboard</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('members')">Members</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" id="sacramentsDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-cross me-1"></i>Sacraments
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'Baptism'})">Baptism</a></li>
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'Confirmation'})">Confirmation</a></li>
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'First Holy Communion'})">First Holy Communion</a></li>
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'Marriage'})">Marriage</a></li>
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'Last Rites'})">Last Rites</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('pledges')">Pledges</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('reports')">Reports</a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <span class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i>
                            <span id="userName"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" onclick="logout()">Logout</a></li>
                        </ul>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="display-6">
                        <i class="fas fa-cross me-2"></i>
                        <span id="sacramentTitle">Sacrament Records</span>
                    </h1>
                    <button class="btn btn-primary btn-lg" onclick="loadPage('sacrament-form', {type: currentSacramentType})">
                        <i class="fas fa-plus me-2"></i>Add New Record
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Sacraments Table -->
        <div class="row">
            <div class="col-12">
                <div class="card shadow">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>Member</th>
                                        <th>Date Received</th>
                                        <th>Officiating Priest</th>
                                        <th>Church Location</th>
                                        <th>Certificate #</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="sacramentsTableBody">
                                    <tr>
                                        <td colspan="6" class="text-center">
                                            <div class="spinner-border text-primary" role="status">
                                                <span class="visually-hidden">Loading...</span>
                                            </div>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentSacramentType = 'Baptism';
        
        function initSacraments(params) {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userName').textContent = user.username || 'User';
            
            if (params.type) {
                currentSacramentType = params.type;
            }
            
            document.getElementById('sacramentTitle').innerHTML = `<i class="fas fa-cross me-2"></i>${currentSacramentType} Records`;
            loadSacraments();
        }
        
        async function loadSacraments() {
            try {
                const sacraments = await apiCall(`/sacraments/?type=${encodeURIComponent(currentSacramentType)}`);
                displaySacraments(sacraments);
            } catch (error) {
                console.error('Error loading sacraments:', error);
                document.getElementById('sacramentsTableBody').innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-danger">
                            <i class="fas fa-exclamation-triangle me-2"></i>Error loading records
                        </td>
                    </tr>
                `;
            }
        }
        
        function displaySacraments(sacraments) {
            const tbody = document.getElementById('sacramentsTableBody');
            
            if (sacraments.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-muted py-4">
                            <i class="fas fa-info-circle me-2"></i>No ${currentSacramentType} records found
                        </td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = sacraments.map(sacrament => `
                <tr>
                    <td>
                        <strong>${sacrament.member_name}</strong>
                    </td>
                    <td>${formatDate(sacrament.date_received)}</td>
                    <td>${sacrament.officiating_priest}</td>
                    <td>${sacrament.church_location || 'N/A'}</td>
                    <td>${sacrament.certificate_number || 'N/A'}</td>
                    <td>
                        <button class="btn btn-sm btn-info me-1" onclick="viewSacrament(${sacrament.id})" title="View Details">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteSacrament(${sacrament.id})" title="Delete">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function viewSacrament(id) {
            // View sacrament details (can be implemented as modal or separate page)
            alert('View sacrament details - Coming soon');
        }
        
        async function deleteSacrament(id) {
            if (confirm('Are you sure you want to delete this sacrament record?')) {
                try {
                    await apiCall(`/sacraments/${id}/`, 'DELETE');
                    loadSacraments();
                    alert('Sacrament record deleted successfully');
                } catch (error) {
                    alert('Error deleting record: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
