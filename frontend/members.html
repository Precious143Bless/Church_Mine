<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Members - Church Registry System</title>
</head>
<body>
    <!-- Navigation (same as dashboard) -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
        <div class="container-fluid">
            <a class="navbar-brand" href="#" onclick="loadPage('dashboard')">
                <i class="fas fa-church me-2"></i>Church Registry System
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav me-auto">
                    <li class="nav-item">
                        <a class="nav-link active" href="#" onclick="loadPage('members')">
                            <i class="fas fa-users me-1"></i>Members
                        </a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="sacramentsDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-cross me-1"></i>Sacraments
                        </a>
                        <ul class="dropdown-menu">
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'Baptism'})">Baptism</a></li>
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'Confirmation'})">Confirmation</a></li>
                            <li><a class="dropdown-item" href="#" onclick="loadPage('sacraments', {type: 'Marriage'})">Marriage</a></li>
                        </ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('pledges')">
                            <i class="fas fa-hand-holding-heart me-1"></i>Pledges
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="#" onclick="loadPage('reports')">
                            <i class="fas fa-chart-bar me-1"></i>Reports
                        </a>
                    </li>
                </ul>
                <div class="navbar-nav">
                    <span class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" id="userDropdown" role="button" data-bs-toggle="dropdown">
                            <i class="fas fa-user-circle me-1"></i>
                            <span id="userName"></span>
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end">
                            <li><a class="dropdown-item" href="#" onclick="logout()">
                                <i class="fas fa-sign-out-alt me-2"></i>Logout
                            </a></li>
                        </ul>
                    </span>
                </div>
            </div>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="container-fluid mt-4">
        <div class="row">
            <div class="col-12">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h1 class="display-6">Church Members</h1>
                    <button class="btn btn-primary" onclick="loadPage('member-form')">
                        <i class="fas fa-plus me-2"></i>Add New Member
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Search Bar -->
        <div class="row mb-4">
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search by name, email, or contact...">
                    <button class="btn btn-outline-primary" type="button" onclick="searchMembers()">
                        <i class="fas fa-search"></i> Search
                    </button>
                </div>
            </div>
        </div>
        
        <!-- Members Table -->
        <div class="row">
            <div class="col-12">
                <div class="card">
                    <div class="card-body">
                        <div class="table-responsive">
                            <table class="table table-hover">
                                <thead class="table-light">
                                    <tr>
                                        <th>#</th>
                                        <th>Full Name</th>
                                        <th>Birth Date</th>
                                        <th>Gender</th>
                                        <th>Contact</th>
                                        <th>Civil Status</th>
                                        <th>Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="membersTableBody">
                                    <tr>
                                        <td colspan="7" class="text-center">Loading...</td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let allMembers = [];
        
        function initMembers() {
            const user = JSON.parse(localStorage.getItem('user') || '{}');
            document.getElementById('userName').textContent = user.username || 'User';
            loadMembers();
        }
        
        async function loadMembers(searchTerm = '') {
            try {
                let url = '/members/';
                if (searchTerm) {
                    url += `?search=${encodeURIComponent(searchTerm)}`;
                }
                
                const members = await apiCall(url);
                allMembers = members;
                displayMembers(members);
            } catch (error) {
                console.error('Error loading members:', error);
                document.getElementById('membersTableBody').innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center text-danger">Error loading members</td>
                    </tr>
                `;
            }
        }
        
        function displayMembers(members) {
            const tbody = document.getElementById('membersTableBody');
            
            if (members.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="7" class="text-center">No members found</td>
                    </tr>
                `;
                return;
            }
            
            tbody.innerHTML = members.map((member, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>
                        <strong>${member.first_name} ${member.middle_name} ${member.last_name}</strong>
                        ${member.suffix ? `<br><small class="text-muted">${member.suffix}</small>` : ''}
                    </td>
                    <td>${new Date(member.birth_date).toLocaleDateString()}</td>
                    <td>${member.gender === 'M' ? 'Male' : 'Female'}</td>
                    <td>${member.contact_number}</td>
                    <td>${member.civil_status}</td>
                    <td>
                        <button class="btn btn-sm btn-info" onclick="loadPage('member-detail', {id: ${member.id}})">
                            <i class="fas fa-eye"></i>
                        </button>
                        <button class="btn btn-sm btn-warning" onclick="loadPage('member-form', {id: ${member.id}})">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-danger" onclick="deleteMember(${member.id})">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }
        
        function searchMembers() {
            const searchTerm = document.getElementById('searchInput').value;
            loadMembers(searchTerm);
        }
        
        async function deleteMember(id) {
            if (confirm('Are you sure you want to delete this member? This will also delete all associated records.')) {
                try {
                    await apiCall(`/members/${id}/`, 'DELETE');
                    loadMembers();
                } catch (error) {
                    alert('Error deleting member: ' + error.message);
                }
            }
        }
    </script>
</body>
</html>
