<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/style.css">
</head>
<body>
    <div id="app">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
        </div>
    </div>

    <script>
        // Check authentication status
        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const currentPage = getCurrentPage();
            
            if (!token && currentPage !== 'login') {
                loadPage('login');
            } else if (token && currentPage === 'login') {
                loadPage('dashboard');
            } else if (currentPage === '') {
                loadPage('login');
            } else {
                loadPage(currentPage);
            }
        }
        
        // Get current page from URL hash
        function getCurrentPage() {
            const hash = window.location.hash.substring(1);
            return hash || localStorage.getItem('currentPage') || 'login';
        }
        
        // Load page dynamically - FIXED VERSION
        async function loadPage(pageName, params = {}) {
            const app = document.getElementById('app');
            
            // Show loading
            app.innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Loading ${pageName}...</p>
                </div>
            `;
            
            try {
                // Try multiple paths to find the HTML file
                let html = null;
                let response = null;
                
                // First try: Direct Django template URL
                try {
                    response = await fetch(`/${pageName}.html`);
                    if (response.ok) {
                        html = await response.text();
                    }
                } catch (e) {
                    console.log('Direct fetch failed, trying static path...');
                }
                
                // Second try: Static path
                if (!html) {
                    try {
                        response = await fetch(`/static/${pageName}.html`);
                        if (response.ok) {
                            html = await response.text();
                        }
                    } catch (e) {
                        console.log('Static fetch failed, trying template path...');
                    }
                }
                
                // Third try: Template path
                if (!html) {
                    try {
                        response = await fetch(`/templates/${pageName}.html`);
                        if (response.ok) {
                            html = await response.text();
                        }
                    } catch (e) {
                        console.log('Template fetch failed');
                    }
                }
                
                if (!html) {
                    throw new Error(`Could not load ${pageName}.html`);
                }
                
                app.innerHTML = html;
                
                // Update URL hash
                window.location.hash = pageName;
                localStorage.setItem('currentPage', pageName);
                
                // Initialize page-specific JavaScript
                initializePage(pageName, params);
                
            } catch (error) {
                console.error('Error loading page:', error);
                app.innerHTML = `
                    <div class="container mt-5">
                        <div class="alert alert-danger">
                            <h4><i class="fas fa-exclamation-triangle"></i> Error Loading Page</h4>
                            <p>Could not load ${pageName}.html</p>
                            <p class="text-muted">Error: ${error.message}</p>
                            <hr>
                            <p>Please check:</p>
                            <ul>
                                <li>File exists in the frontend folder: <code>frontend/${pageName}.html</code></li>
                                <li>Django server is running: <code>python manage.py runserver</code></li>
                                <li>Static files are being served correctly</li>
                            </ul>
                            <button class="btn btn-primary mt-3" onclick="loadPage('dashboard')">
                                <i class="fas fa-home"></i> Go to Dashboard
                            </button>
                            <button class="btn btn-secondary mt-3 ms-2" onclick="location.reload()">
                                <i class="fas fa-sync"></i> Refresh
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        
        // Initialize page based on name
        function initializePage(pageName, params) {
            console.log('Initializing page:', pageName);
            switch(pageName) {
                case 'login':
                    if (typeof initLogin === 'function') initLogin();
                    break;
                case 'dashboard':
                    if (typeof initDashboard === 'function') initDashboard();
                    break;
                case 'members':
                    if (typeof initMembers === 'function') initMembers();
                    break;
                case 'member-detail':
                    if (typeof initMemberDetail === 'function') initMemberDetail(params);
                    break;
                case 'member-form':
                    if (typeof initMemberForm === 'function') initMemberForm(params);
                    break;
                case 'sacraments':
                    if (typeof initSacraments === 'function') initSacraments(params);
                    break;
                case 'sacrament-form':
                    if (typeof initSacramentForm === 'function') initSacramentForm(params);
                    break;
                case 'pledges':
                    if (typeof initPledges === 'function') initPledges();
                    break;
                case 'pledge-form':
                    if (typeof initPledgeForm === 'function') initPledgeForm(params);
                    break;
                case 'payments':
                    if (typeof initPayments === 'function') initPayments(params);
                    break;
                case 'reports':
                    if (typeof initReports === 'function') initReports();
                    break;
                default:
                    console.log('No initialization for:', pageName);
            }
        }
        
        // API Helper Function
        async function apiCall(endpoint, method = 'GET', data = null) {
            const token = localStorage.getItem('auth_token');
            const headers = {
                'Content-Type': 'application/json',
            };
            
            if (token) {
                headers['Authorization'] = `Token ${token}`;
            }
            
            const options = {
                method: method,
                headers: headers,
            };
            
            if (data) {
                options.body = JSON.stringify(data);
            }
            
            try {
                const response = await fetch(`/api${endpoint}`, options);
                const result = await response.json();
                
                if (!response.ok) {
                    if (response.status === 401) {
                        localStorage.removeItem('auth_token');
                        localStorage.removeItem('user');
                        loadPage('login');
                        throw new Error('Session expired. Please login again.');
                    }
                    throw new Error(result.error || result.message || 'API Error');
                }
                
                return result;
            } catch (error) {
                console.error('API Error:', error);
                throw error;
            }
        }
        
        // Logout function
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user');
                localStorage.removeItem('currentPage');
                loadPage('login');
            }
        }
        
        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-PH', { 
                style: 'currency', 
                currency: 'PHP',
                minimumFractionDigits: 2
            }).format(amount);
        }
        
        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleDateString('en-PH', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        // Check auth on page load
        document.addEventListener('DOMContentLoaded', checkAuth);
        
        // Listen for hash changes
        window.addEventListener('hashchange', () => {
            const page = getCurrentPage();
            if (page !== 'login' || localStorage.getItem('auth_token')) {
                loadPage(page);
            }
        });
    </script>
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="/static/js/app.js"></script>
</body>
</html>
