<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Church Registry System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <!-- Updated path to CSS -->
    <link rel="stylesheet" href="/static/style/style.css">
</head>
<body>
    <div id="app">
        <div class="text-center py-5">
            <div class="spinner-border text-primary" role="status">
                <span class="visually-hidden">Loading...</span>
            </div>
            <p class="mt-2">Loading Church Registry System...</p>
        </div>
    </div>

    <script>
        // Global variables
        let currentPage = 'login';
        
        // Load page function
        async function loadPage(pageName) {
            const app = document.getElementById('app');
            currentPage = pageName;
            
            // Show loading
            app.innerHTML = `
                <div class="text-center py-5">
                    <div class="spinner-border text-primary" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                    <p class="mt-2">Loading ${pageName}...</p>
                </div>
            `;
            
            try {
                // Try to fetch the HTML file
                const response = await fetch(`/${pageName}.html`);
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const html = await response.text();
                app.innerHTML = html;
                
                // Update URL hash
                window.location.hash = pageName;
                
                // Initialize page scripts
                setTimeout(() => {
                    if (pageName === 'login' && typeof window.initLogin === 'function') {
                        window.initLogin();
                    } else if (pageName === 'dashboard' && typeof window.initDashboard === 'function') {
                        window.initDashboard();
                    } else if (pageName === 'members' && typeof window.initMembers === 'function') {
                        window.initMembers();
                    }
                }, 100);
                
            } catch (error) {
                console.error('Error loading page:', error);
                app.innerHTML = `
                    <div class="container mt-5">
                        <div class="alert alert-danger">
                            <h4><i class="fas fa-exclamation-triangle"></i> Error Loading Page</h4>
                            <p>Could not load ${pageName}.html</p>
                            <p class="text-muted">Error: ${error.message}</p>
                            <hr>
                            <h5>Debug Information:</h5>
                            <ul>
                                <li>File should be at: <code>frontend/${pageName}.html</code></li>
                                <li>Try visiting: <a href="/${pageName}.html" target="_blank">/${pageName}.html</a></li>
                                <li>Debug endpoint: <a href="/api/debug-files/" target="_blank">/api/debug-files/</a></li>
                            </ul>
                            <button class="btn btn-primary mt-2" onclick="loadPage('login')">
                                <i class="fas fa-sync"></i> Try Again
                            </button>
                        </div>
                    </div>
                `;
            }
        }
        
        // API call helper
        async function apiCall(endpoint, method = 'GET', data = null) {
            const token = localStorage.getItem('auth_token');
            const headers = {
                'Content-Type': 'application/json',
            };
            
            if (token) {
                headers['Authorization'] = `Token ${token}`;
            }
            
            const options = {
                method: method,
                headers: headers,
            };
            
            if (data) {
                options.body = JSON.stringify(data);
            }
            
            const response = await fetch(`/api${endpoint}`, options);
            const result = await response.json();
            
            if (!response.ok) {
                if (response.status === 401) {
                    localStorage.removeItem('auth_token');
                    localStorage.removeItem('user');
                    loadPage('login');
                }
                throw new Error(result.error || 'API Error');
            }
            
            return result;
        }
        
        // Check authentication
        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            if (token) {
                loadPage('dashboard');
            } else {
                loadPage('login');
            }
        }
        
        // Logout function
        function logout() {
            if (confirm('Are you sure you want to logout?')) {
                localStorage.removeItem('auth_token');
                localStorage.removeItem('user');
                loadPage('login');
            }
        }
        
        // Format currency
        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-PH', { 
                style: 'currency', 
                currency: 'PHP',
                minimumFractionDigits: 2
            }).format(amount);
        }
        
        // Format date
        function formatDate(dateString) {
            if (!dateString) return 'N/A';
            return new Date(dateString).toLocaleDateString('en-PH', {
                year: 'numeric',
                month: 'long',
                day: 'numeric'
            });
        }
        
        // Start the app
        checkAuth();
        
        // Listen for hash changes
        window.addEventListener('hashchange', () => {
            const hash = window.location.hash.substring(1);
            if (hash && hash !== currentPage) {
                loadPage(hash);
            }
        });
    </script>
    
    <!-- Updated path to JavaScript -->
    <script src="/static/scripts/app.js"></script>
</body>
</html>
